<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B12">
  <meta name="description" content="Piano — le compagnon de ton vrai piano : il écoute ce qui se joue et écrit la partition (silences compris), puis te fait rejouer chaque partition en rythme, validée au micro.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Piano">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Piano</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-180-v3.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192-v3.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512-v3.png">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1 class="hero__title">Piano</h1>
      <p class="hero__sub" id="headSub">Le compagnon du vrai piano</p>
      <span class="hero__spacer"></span>
      <span class="kb-live" id="kbLive" hidden></span>
      <button class="hero-btn hero-btn--listen" id="listenBtn" type="button"><i class="dot"></i>Écoute</button>
    </header>

    <nav class="tabs tabs--2" id="tabs">
      <button class="tab tab--active" data-tab="partition" type="button">𝄞 Partition</button>
      <button class="tab" data-tab="jouer" type="button">▶ Jouer</button>
    </nav>

    <section class="stage" id="stage"></section>
  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
